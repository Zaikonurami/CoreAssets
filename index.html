<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CORE</title>
    <!-- Fuentes modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0d13;
            --text-primary: #ffffff;
            --text-secondary: #8a94a6;
            --accent-cyan: #00f2fe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Destello sutil en el fondo detrás del texto */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-cyan) 0%, transparent 70%);
            filter: blur(90px);
            opacity: 0.15;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        /* Contenedor del contenido (Sin cuadro de fondo) */
        .container {
            position: relative;
            z-index: 2;
            padding: 2.5rem 3.5rem;
            text-align: center;
            max-width: 90%;
            width: 460px;
        }

        /* Líneas modulares de las esquinas enmarcando el texto */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: var(--accent-cyan);
            border-style: solid;
            opacity: 0.7;
        }
        /* Esquina superior izquierda */
        .container::before {
            top: 0;
            left: 0;
            border-width: 1px 0 0 1px;
        }
        /* Esquina inferior derecha */
        .container::after {
            bottom: 0;
            right: 0;
            border-width: 0 1px 1px 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Indicador de estado */
        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 2rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            opacity: 0.8;
            background: rgba(0, 242, 254, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.12);
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px var(--accent-cyan); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>THE CORE</h1>
        <p>Just my website's serving cdn</p>
        
        <div class="status-dot">
            <span class="dot"></span>
            <span>Online</span>
        </div>
    </div>

</body>
</html>
